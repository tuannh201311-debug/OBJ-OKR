services:
  db:
    image: mongo:6.0
    container_name: okr-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=okr_app
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend_python
      dockerfile: Dockerfile
    container_name: okr-backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://db:27017
      - DATABASE_NAME=okr_app
      - SECRET_KEY=your_super_secret_key_change_me
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: okr-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
